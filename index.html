<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reference Code Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #0f172a;
            color: white;
        }

        input {
            padding: 10px;
            font-size: 16px;
            width: 220px;
            border-radius: 8px;
            border: none;
            margin-right: 10px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background-color: #22c55e;
            color: white;
        }

        #output {
            margin-top: 30px;
            font-size: 18px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        table {
            border-collapse: collapse;
            margin: auto;
            width: 100%;
            background-color: #1e293b;
        }

        th, td {
            border: 1px solid #334155;
            padding: 10px;
        }

        th {
            background-color: #334155;
        }

        a {
            color: #38bdf8;
        }
    </style>
</head>
<body>

    <h1>Enter Reference Code</h1>

    <input type="text" id="codeInput" placeholder="Enter code..." onkeypress="handleKey(event)">
    <button onclick="checkCode()">Submit</button>

    <div id="output"></div>

    <script>
        const codes = {

            "USH": {
                type: "redirect",
                value: "https://xapdswat.github.io/randomiser/"
            },

            "XOG": {
                type: "text",
                value: "Xandopsy Games is the perfect gaming company for you. With two games in late phases on Roblox, we are also in the early stages of developing a .exe game."
            },

            "CIO": {
                type: "text",
                value: "Mobile number: +447344141887<br>Email: xandercorporation@outlook.com"
            },

            "QT-19": {
                type: "text",
                value: "You owe Xander Corporation or one of its child companies' money. Please use reference code CIO for our contact info so you can coordinate with us."
            },

            "QT-20": {
                type: "text",
                value: "You are owed money by Xander Corporation or one of its child companies'. Please use reference code CIO for our contact info so you can coordinate with us."
            },

            "YT": {
                type: "redirect",
                value: "https://youtube.com/@DasTheGamerYT"
            },

            "WBS": {
                type: "text",
                value: `
                    Randomiser: https://xapdswat.github.io/randomiser/<br>
                    XAPDSWAT: https://xapdswat.github.io/XAPDSWAT/<br>
                    EPICWEBSITE: https://xapdswat.github.io/EPICWEBSITE/<br>
                    Creator Vault: https://xapdswat.github.io/creatorvault/
                `
            },

            "VT": {
                type: "redirect",
                value: "https://www.virustotal.com/"
            },

            "RL-10": {
                type: "text",
                value: "Congratulations for being relative of A. H. G.!"
            },

            "XGH": {
                type: "redirect",
                value: "https://github.com/XAPDSWAT/"
            },

            "CODES": {
                type: "text",
                value: `
                <table>
                    <tr><th>Code</th><th>Type</th><th>Action</th></tr>
                    <tr><td>USH</td><td>Redirect</td><td>https://xapdswat.github.io/randomiser/</td></tr>
                    <tr><td>XOG</td><td>Text</td><td>Xandopsy Games is the perfect gaming company for you...</td></tr>
                    <tr><td>CIO</td><td>Text</td><td>Mobile number: +447344141887 | Email: xandercorporation@outlook.com</td></tr>
                    <tr><td>QT-19</td><td>Text</td><td>You owe Xander Corporation...</td></tr>
                    <tr><td>QT-20</td><td>Text</td><td>You are owed money by Xander Corporation...</td></tr>
                    <tr><td>YT</td><td>Redirect</td><td>https://youtube.com/DasTheGamerYT</td></tr>
                    <tr><td>WBS</td><td>Text</td><td>Multiple website links</td></tr>
                    <tr><td>VT</td><td>Redirect</td><td>https://www.virustotal.com/</td></tr>
                    <tr><td>RL-10</td><td>Text</td><td>Congratulations for being relative of A. H. G.!</td></tr>
                </table>
                `
            }

        };

        function checkCode() {
            const input = document.getElementById("codeInput").value.trim().toUpperCase();
            const output = document.getElementById("output");

            if (codes[input]) {
                if (codes[input].type === "redirect") {
                    window.open(codes[input].value, "_blank"); // opens in new tab
                } else {
                    output.innerHTML = codes[input].value;
                }
            } else {
                output.innerHTML = "Invalid reference code.";
            }
        }

        function handleKey(event) {
            if (event.key === "Enter") {
                checkCode();
            }
        }
    </script>

</body>
</html>
